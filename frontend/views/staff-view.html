<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="fw-bold mb-0" id="staff-page-title">Danh sách Nhân sự</h4>

    <button id="add-staff-btn" class="btn btn-primary-custom shadow-sm" data-bs-toggle="modal" data-bs-target="#addStaffModal">
        <i class="fa-solid fa-plus me-1"></i> Thêm Nhân sự
    </button>
</div>

<div id="staff-filter-container" class="d-flex gap-2 mb-4 overflow-auto pb-2" style="white-space: nowrap">
    <button id="btn-filter-ALL" class="btn btn-success rounded-pill px-4 shadow-sm filter-btn" onclick="filterStaff('ALL')">Tất cả</button>
    <button id="btn-filter-DOCTOR" class="btn btn-outline-secondary rounded-pill px-4 filter-btn" onclick="filterStaff('DOCTOR')">Bác sĩ</button>
    <button id="btn-filter-RECEPTIONIST" class="btn btn-outline-secondary rounded-pill px-4 filter-btn" onclick="filterStaff('RECEPTIONIST')">Lễ tân</button>
    <button id="btn-filter-ADMIN" class="btn btn-outline-secondary rounded-pill px-4 filter-btn" onclick="filterStaff('ADMIN')">Quản trị viên</button>
</div>

<div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4" id="staff-card-container">
</div>

<section>
    <div class="modal fade" id="addStaffModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 16px">
                <div class="modal-header" style="background-color: #f5f8fa; border-radius: 16px 16px 0 0">
                    <h5 class="modal-title fw-bold text-success"><i class="fa-solid fa-user-plus me-2"></i> Thêm Nhân sự mới</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="addStaffForm">
                        <p class="text-muted"><i>(Form giữ nguyên như thiết kế của bác...)</i></p>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editStaffModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 16px">
                <div class="modal-header" style="background-color: #f5f8fa; border-radius: 16px 16px 0 0">
                    <h5 class="modal-title fw-bold text-success"><i class="fa-regular fa-pen-to-square me-2"></i> Cập nhật hồ sơ</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4 text-center text-muted">
                    <i>(Form cập nhật tương tự Form Thêm mới)</i>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="deleteStaffModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-sm modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 16px">
                <div class="modal-body p-4 text-center">
                    <div class="text-danger mb-3"><i class="fa-solid fa-circle-exclamation" style="font-size: 4rem"></i></div>
                    <h5 class="fw-bold mb-2 text-dark">Xác nhận Xóa?</h5>
                    <p class="text-muted mb-4" style="font-size: 0.9rem">Bạn có chắc chắn muốn xóa nhân sự này khỏi hệ thống?</p>
                    <div class="d-flex justify-content-center gap-2">
                        <button type="button" class="btn btn-light border px-4" data-bs-dismiss="modal">Hủy</button>
                        <button type="button" class="btn btn-danger px-4 shadow-sm">Xác nhận</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
